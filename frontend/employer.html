
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Next Horizons - Employer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Employer Dashboard</h1>
      <button id="logoutBtn" class="ghost">Log out</button>
    </div>

    <section class="card">
      <h2>Post a job</h2>
      <form id="jobForm" class="stack">
        <input id="company" placeholder="Company" required />
        <input id="title" placeholder="Job title" required />
        <textarea id="duties" placeholder="Duties (comma separated bullet points)"></textarea>
        <textarea id="education_req" placeholder="Education requirements (comma separated)"></textarea>
        <textarea id="experience_req" placeholder="Job history requirements (comma separated)"></textarea>
        <select id="work_location">
          <option>Remote</option>
          <option>On-Site</option>
          <option>Hybrid</option>
        </select>
        <input id="remote_scope" placeholder="If remote: in-state only or anywhere?" />
        <input id="timezone_hiring_for" placeholder="Time zone hiring for" />
        <input id="timezone_hiring_from" placeholder="Time zone hiring from" />
        <input id="days_shifts" placeholder="Days and shifts (comma separated)" />
        <input id="pay_rate" placeholder="Pay rate / salary" />
        <select id="job_type">
          <option>Full-Time</option>
          <option>Part-Time</option>
          <option>Contract</option>
          <option>Internship</option>
        </select>
        <button type="submit">Post job</button>
      </form>
    </section>

    <section class="card">
      <h2>Your jobs</h2>
      <div id="jobs"></div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="employer.js"></script>
</body>
</html>
