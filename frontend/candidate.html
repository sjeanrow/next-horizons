<!doctype html>
<html lang="en">
   <head>
      <meta charset="utf-8"/>
      <meta name="viewport" content="width=device-width,initial-scale=1"/>
      <title>Next Horizons - Candidate</title>
      <link rel="stylesheet" href="styles.css"/>
   </head>
   <body>
      <div class="wrap">
         <div class="topbar">
            <h1>Candidate Dashboard</h1>
            <div class="tabs"><button class="secondary small" data-tab="profileTab">Profile</button><button class="secondary small" data-tab="matchesTab">Matches</button><button class="secondary small" data-tab="applicationsTab">Applications</button><button id="logoutBtn" class="secondary small">Log out</button></div>
         </div>
         <section id="profileTab" class="card">
            <h2>Your profile</h2>
            <form id="profileForm" class="stack">
               <div class="row"><input id="first_name" placeholder="First name"/><input id="last_name" placeholder="Last name"/></div>
               <div class="row"><input id="phone" placeholder="Best number to reach at"/><input id="pronouns" placeholder="Pronouns"/></div>
               <input id="previous_names" placeholder="Previous legal names (optional, comma separated)"/>
               <div class="row">
                  <select id="job_type">
                     <option value="">What are you looking for?</option>
                     <option>Full-Time</option>
                     <option>Part-Time</option>
                     <option>Contract</option>
                     <option>Internship</option>
                  </select>
                  <input id="desired_title_input" placeholder="Add desired job title"/>
               </div>
               <button type="button" id="addDesiredTitle" class="secondary small">Add desired title</button>
               <div id="desired_titles_chips" class="chip-wrap"></div>
               <div class="row"><input id="desired_duty_input" placeholder="Add desired duty"/><button type="button" id="addDesiredDuty" class="secondary small">Add desired duty</button></div>
               <div id="desired_duties_chips" class="chip-wrap"></div>
               <div class="section-title">
                  <h3>Job Experience</h3>
                  <button type="button" id="addExperience" class="secondary small">Add experience</button>
               </div>
               <div id="experienceList" class="list"></div>
               <div class="section-title">
                  <h3>Education</h3>
                  <button type="button" id="addEducation" class="secondary small">Add education</button>
               </div>
               <div id="educationList" class="list"></div>
               <div class="section-title">
                  <h3>Languages Spoken</h3>
               </div>
               <div class="row"><input id="languageInput" placeholder="Add language"/><button type="button" id="addLanguage" class="secondary small">Add language</button></div>
               <div id="languageChips" class="chip-wrap"></div>
               <div class="section-title">
                  <h3>Certificates & Licenses</h3>
               </div>
               <div class="row"><input id="certificateInput" placeholder="Add certificate or license"/><button type="button" id="addCertificate" class="secondary small">Add certificate</button></div>
               <div id="certificateChips" class="chip-wrap"></div>
               <div class="section-title">
                  <h3>Military Experience</h3>
               </div>
               <div class="row"><input id="militaryInput" placeholder="Add military experience entry"/><button type="button" id="addMilitary" class="secondary small">Add military experience</button></div>
               <div id="militaryChips" class="chip-wrap"></div>
               <button type="submit">Save profile</button>
            </form>
         </section>
         <section id="matchesTab" class="card hidden">
            <h2>Matching jobs</h2>
            <div id="matches"></div>
         </section>
         <section id="applicationsTab" class="card hidden">
            <h2>Your applications</h2>
            <div id="applications"></div>
         </section>
      </div>
      <script src="config.js"></script><script src="candidate.js"></script>
   </body>
</html>
